<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Challenger</title>
<style>
:root {
  --bg: #1a1a2e;
  --bg2: #16213e;
  --bg3: #0f3460;
  --accent: #e94560;
  --accent2: #533483;
  --text: #e0e0e0;
  --text2: #a0a0b0;
  --border: #2a2a4a;
  --designer: #2d6a4f;
  --challenger: #9b2226;
  --human: #7b4a2a;
  --system: #3a3a5c;
  --warn: #e07b00;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; }
#sidebar { width: 280px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
#sidebar h2 { padding: 16px; font-size: 16px; border-bottom: 1px solid var(--border); }
#session-list { flex: 1; overflow-y: auto; padding: 8px; }
.session-item { padding: 10px 12px; margin-bottom: 4px; border-radius: 6px; cursor: pointer; font-size: 13px; border: 1px solid transparent; transition: all 0.15s; display: flex; justify-content: space-between; align-items: center; }
.session-item:hover { background: var(--bg3); }
.session-item.active { border-color: var(--accent); background: var(--bg3); }
.session-item .title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.session-item .status { font-size: 11px; padding: 2px 6px; border-radius: 4px; margin-left: 8px; flex-shrink: 0; }
.session-item .status.running { background: #e07b00; color: #fff; }
.session-item .status.completed { background: #2d6a4f; color: #fff; }
.session-item .status.interrupted { background: #9b2226; color: #fff; }
.session-item .status.awaiting_human { background: #7b4a2a; color: #fff; }
.session-item .status.pending { background: #555; color: #fff; }
.session-item .delete-btn { background: none; border: none; color: #666; cursor: pointer; font-size: 14px; padding: 2px 6px; margin-left: 4px; border-radius: 3px; }
.session-item .delete-btn:hover { color: var(--accent); background: rgba(233,69,96,0.15); }
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#header { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; background: var(--bg2); }
#header h1 { font-size: 18px; font-weight: 600; }
#header h1 span { color: var(--accent); }
#input-area { padding: 16px 20px; border-bottom: 1px solid var(--border); background: var(--bg2); }
#input-area .row { display: flex; gap: 10px; margin-bottom: 10px; }
#requirement-input { flex: 1; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 14px; font-family: inherit; resize: vertical; min-height: 60px; }
#requirement-input::placeholder { color: #555; }
#file-input { display: none; }
.btn { padding: 8px 16px; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #d63850; }
.btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--accent2); }
.btn-danger { background: #9b2226; color: #fff; }
.btn-danger:hover { background: #7f1d1d; }
.btn-warn { background: var(--warn); color: #fff; }
.btn-warn:hover { background: #c06a00; }
.btn-success { background: #2d6a4f; color: #fff; }
.btn-success:hover { background: #1f4a37; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.level-select { display: flex; gap: 8px; align-items: center; }
.level-select label { font-size: 13px; color: var(--text2); }
.level-select select { padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; }
#chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
#chat-area .empty-state { text-align: center; color: var(--text2); margin-top: 80px; font-size: 14px; }
#chat-area .empty-state p { margin: 8px 0; }
.message { padding: 14px 18px; border-radius: 8px; font-size: 14px; line-height: 1.6; max-width: 100%; }
.message.designer { background: var(--designer); border-left: 3px solid #52b788; }
.message.challenger { background: var(--challenger); border-left: 3px solid #e76f51; }
.message.human_challenge { background: var(--human); border-left: 3px solid #e0a060; }
.message.system { background: var(--system); border-left: 3px solid #7b7b9a; font-size: 13px; }
.message .msg-header { font-size: 12px; font-weight: 600; margin-bottom: 8px; color: rgba(255,255,255,0.7); text-transform: uppercase; }
.message .msg-content { white-space: pre-wrap; word-wrap: break-word; }
.message .msg-content h1, .message .msg-content h2 { font-size: 16px; margin: 10px 0 6px; }
.message .msg-content h3 { font-size: 14px; margin: 8px 0 4px; }
.message .msg-content code { background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 3px; font-size: 12px; }
.message .msg-content pre { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 4px; overflow-x: auto; font-size: 12px; margin: 8px 0; }
.message .msg-content pre code { background: none; padding: 0; }
#human-review-bar { padding: 12px 20px; background: var(--human); border-top: 2px solid var(--warn); display: none; gap: 8px; align-items: center; }
#human-review-bar.show { display: flex; }
#human-review-bar span { font-size: 13px; flex: 1; }
#human-review-bar input { flex: 2; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; }
#action-bar { padding: 12px 20px; border-top: 1px solid var(--border); background: var(--bg2); display: flex; gap: 8px; align-items: center; min-height: 52px; }
#action-bar .hint { font-size: 12px; color: var(--text2); margin-left: auto; }
#status-indicator { display: flex; align-items: center; gap: 6px; font-size: 13px; padding: 4px 12px; }
#status-indicator .dot { width: 8px; height: 8px; border-radius: 50%; }
#status-indicator .dot.running { background: #e07b00; animation: pulse 1.5s infinite; }
#status-indicator .dot.completed { background: #52b788; }
#status-indicator .dot.interrupted { background: #e76f51; }
#status-indicator .dot.awaiting_human { background: #e0a060; animation: pulse 1.5s infinite; }
#status-indicator .dot.idle { background: #555; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="sidebar">
  <h2>Sessions</h2>
  <div id="session-list"></div>
</div>

<div id="main">
  <div id="header">
    <h1>Design <span>Challenger</span></h1>
    <div id="status-indicator">
      <span class="dot idle"></span>
      <span id="status-text">Idle</span>
    </div>
  </div>

  <div id="input-area">
    <div class="row">
      <textarea id="requirement-input" placeholder="Paste your requirement here, or upload a .md file..."></textarea>
    </div>
    <div class="row" style="justify-content: space-between; align-items: center;">
      <div class="level-select">
        <label>Level:</label>
        <select id="level-select">
          <option value="weak">Weak</option>
          <option value="medium" selected>Medium</option>
          <option value="strong">Strong</option>
        </select>
        <input type="file" id="file-input" accept=".md,.txt">
        <button class="btn btn-secondary" onclick="document.getElementById('file-input').click()">Load File</button>
        <span id="file-name" style="font-size:12px; color:var(--text2); margin-left:4px;"></span>
      </div>
      <div style="display:flex; gap:8px;">
        <button class="btn btn-danger" id="stop-btn" onclick="stopSession()" disabled>Stop</button>
        <button class="btn btn-primary" id="start-btn" onclick="startChallenge()">Start Challenge</button>
      </div>
    </div>
  </div>

  <div id="human-review-bar">
    <span>&#x1F441; Challenger signed off. Your review:</span>
    <input type="text" id="human-review-input" placeholder="Type your challenges or 'sign off' to finish...">
    <button class="btn btn-warn" id="human-challenge-btn" onclick="submitHumanChallenge()">Submit Challenge</button>
    <button class="btn btn-success" id="human-signoff-btn" onclick="submitHumanSignoff()">Sign Off &amp; Finish</button>
  </div>

  <div id="chat-area">
    <div class="empty-state">
      <p>Enter your design requirement above, select a challenge level, and click <strong>Start Challenge</strong>.</p>
      <p>The DesignerExpert and Challenger agents will engage in an adversarial design review.</p>
    </div>
  </div>

  <div id="action-bar">
    <button class="btn btn-secondary" id="download-log-btn" onclick="downloadLog()" disabled>Download Log</button>
    <button class="btn btn-secondary" id="download-doc-btn" onclick="downloadDoc()" disabled>Download Design Doc</button>
    <button class="btn btn-secondary" id="continue-btn" onclick="continueSession()" style="display:none;">Continue</button>
    <span class="hint" id="token-hint"></span>
  </div>
</div>

<script>
let currentSessionId = null;
let currentStatus = 'idle';
let eventSource = null;

document.getElementById('file-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (file) {
    document.getElementById('file-name').textContent = file.name;
    const reader = new FileReader();
    reader.onload = function(ev) {
      document.getElementById('requirement-input').value = ev.target.result;
    };
    reader.readAsText(file);
  }
});

async function startChallenge() {
  const requirement = document.getElementById('requirement-input').value.trim();
  const level = document.getElementById('level-select').value;
  const fileInput = document.getElementById('file-input');
  const file = fileInput.files[0];

  if (!requirement && !file) {
    alert('Please enter a requirement or select a file.');
    return;
  }

  const formData = new FormData();
  formData.append('challenge_level', level);
  if (file) {
    formData.append('file', file);
  } else {
    formData.append('requirement', requirement);
  }

  setUIState('running');
  document.getElementById('chat-area').innerHTML = '';

  try {
    const resp = await fetch('/api/sessions', { method: 'POST', body: formData });
    if (!resp.ok) { const err = await resp.json(); alert(err.detail); setUIState('idle'); return; }
    const data = await resp.json();
    currentSessionId = data.session_id;
    connectSSE(false);
  } catch (e) {
    alert('Failed to create session: ' + e.message);
    setUIState('idle');
  }
}

function continueSession() {
  if (!currentSessionId) return;
  setUIState('running');
  document.getElementById('chat-area').innerHTML = '';
  connectSSE(true);
}

function connectSSE(resume) {
  if (eventSource) { eventSource.close(); eventSource = null; }

  const url = `/api/sessions/${currentSessionId}/stream?resume=${resume}`;
  eventSource = new EventSource(url);

  eventSource.addEventListener('message', function(e) {
    const data = JSON.parse(e.data);

    if (data.type === 'message') {
      appendMessage(data);
    } else if (data.type === 'completed') {
      setUIState('completed');
      eventSource.close();
      eventSource = null;
      loadSessions();
    } else if (data.type === 'interrupted') {
      setUIState('interrupted');
      eventSource.close();
      eventSource = null;
      loadSessions();
    } else if (data.type === 'human_review_needed') {
      setUIState('awaiting_human');
      eventSource.close();
      eventSource = null;
      document.getElementById('human-review-input').value = '';
      document.getElementById('human-review-input').focus();
      loadSessions();
    } else if (data.type === 'error') {
      appendMessage({ role: 'system', content: 'Error: ' + data.message, round: '?', type: 'error' });
      setUIState('interrupted');
      eventSource.close();
      eventSource = null;
    }
  });

  eventSource.addEventListener('error', function(e) {
    if (eventSource.readyState === EventSource.CLOSED) {
      if (currentStatus === 'running') {
        setUIState('interrupted');
      }
      eventSource = null;
      loadSessions();
    }
  });
}

function appendMessage(msg) {
  const area = document.getElementById('chat-area');
  if (area.querySelector('.empty-state')) area.innerHTML = '';

  const div = document.createElement('div');
  const roleClass = msg.type === 'human_challenge' ? 'human_challenge' : msg.role;
  div.className = 'message ' + roleClass;
  div.innerHTML = `<div class="msg-header">${msg.role.toUpperCase()} &mdash; Round ${msg.round} (${msg.type})</div>
                   <div class="msg-content">${escapeHtml(msg.content)}</div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

async function stopSession() {
  if (!currentSessionId) return;
  try {
    await fetch(`/api/sessions/${currentSessionId}/stop`, { method: 'POST' });
  } catch(e) {}
}

async function submitHumanChallenge() {
  const input = document.getElementById('human-review-input').value.trim();
  if (!input) return;

  // Add human challenge message to chat immediately
  appendMessage({
    role: 'human',
    content: input,
    round: 'H',
    type: 'human_challenge'
  });

  // Save human challenge to backend
  try {
    const resp = await fetch(`/api/sessions/${currentSessionId}/human_review`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: input })
    });
    if (!resp.ok) { const err = await resp.json(); alert(err.detail); return; }
    const data = await resp.json();

    if (data.status === 'completed') {
      setUIState('completed');
      loadSessions();
    } else {
      setUIState('running');
      connectHumanStream();
    }
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function submitHumanSignoff() {
  try {
    await fetch(`/api/sessions/${currentSessionId}/human_review`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: '我sign off，没有更多疑问' })
    });
    setUIState('completed');
    loadSessions();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

function connectHumanStream() {
  if (eventSource) { eventSource.close(); eventSource = null; }

  const url = `/api/sessions/${currentSessionId}/stream_human`;
  eventSource = new EventSource(url);

  eventSource.addEventListener('message', function(e) {
    const data = JSON.parse(e.data);

    if (data.type === 'message') {
      appendMessage(data);
    } else if (data.type === 'human_review_needed') {
      setUIState('awaiting_human');
      eventSource.close();
      eventSource = null;
      document.getElementById('human-review-input').value = '';
      document.getElementById('human-review-input').focus();
      loadSessions();
    } else if (data.type === 'completed') {
      setUIState('completed');
      eventSource.close();
      eventSource = null;
      loadSessions();
    } else if (data.type === 'error') {
      appendMessage({ role: 'system', content: 'Error: ' + data.message, round: '?', type: 'error' });
      setUIState('interrupted');
      eventSource.close();
      eventSource = null;
    }
  });

  eventSource.addEventListener('error', function(e) {
    if (eventSource.readyState === EventSource.CLOSED) {
      if (currentStatus === 'running') setUIState('interrupted');
      eventSource = null;
      loadSessions();
    }
  });
}

function setUIState(state) {
  currentStatus = state;
  const dot = document.querySelector('#status-indicator .dot');
  const text = document.getElementById('status-text');
  const startBtn = document.getElementById('start-btn');
  const stopBtn = document.getElementById('stop-btn');
  const contBtn = document.getElementById('continue-btn');
  const dlLog = document.getElementById('download-log-btn');
  const dlDoc = document.getElementById('download-doc-btn');
  const input = document.getElementById('requirement-input');
  const level = document.getElementById('level-select');
  const fileBtn = document.querySelector('#input-area .btn-secondary');
  const humanBar = document.getElementById('human-review-bar');

  dot.className = 'dot';

  humanBar.classList.remove('show');
  contBtn.style.display = 'none';

  switch(state) {
    case 'idle':
      dot.classList.add('idle'); text.textContent = 'Idle';
      startBtn.disabled = false; stopBtn.disabled = true;
      dlLog.disabled = true; dlDoc.disabled = true;
      input.disabled = false; level.disabled = false;
      if (fileBtn) fileBtn.disabled = false;
      break;
    case 'running':
      dot.classList.add('running'); text.textContent = 'Running';
      startBtn.disabled = true; stopBtn.disabled = false;
      dlLog.disabled = true; dlDoc.disabled = true;
      input.disabled = true; level.disabled = true;
      if (fileBtn) fileBtn.disabled = true;
      break;
    case 'completed':
      dot.classList.add('completed'); text.textContent = 'Completed';
      startBtn.disabled = true; stopBtn.disabled = true;
      dlLog.disabled = false; dlDoc.disabled = false;
      input.disabled = true; level.disabled = true;
      if (fileBtn) fileBtn.disabled = true;
      break;
    case 'interrupted':
      dot.classList.add('interrupted'); text.textContent = 'Interrupted';
      startBtn.disabled = true; stopBtn.disabled = true;
      contBtn.style.display = 'inline-block';
      dlLog.disabled = true; dlDoc.disabled = true;
      input.disabled = true; level.disabled = true;
      if (fileBtn) fileBtn.disabled = true;
      break;
    case 'awaiting_human':
      dot.classList.add('awaiting_human'); text.textContent = 'Awaiting Your Review';
      startBtn.disabled = true; stopBtn.disabled = true;
      dlLog.disabled = true; dlDoc.disabled = true;
      input.disabled = true; level.disabled = true;
      if (fileBtn) fileBtn.disabled = true;
      humanBar.classList.add('show');
      break;
  }
}

function downloadLog() {
  if (!currentSessionId) return;
  window.open(`/api/sessions/${currentSessionId}/download/log`, '_blank');
}

function downloadDoc() {
  if (!currentSessionId) return;
  window.open(`/api/sessions/${currentSessionId}/download/doc`, '_blank');
}

async function loadSessions() {
  try {
    const resp = await fetch('/api/sessions');
    const data = await resp.json();
    const list = document.getElementById('session-list');
    list.innerHTML = '';

    data.sessions.forEach(s => {
      const div = document.createElement('div');
      div.className = 'session-item';
      if (s.id === currentSessionId) div.classList.add('active');
      div.innerHTML = `
        <span class="title" title="${escapeAttr(s.title)}">${escapeHtml(s.title)}</span>
        <span class="status ${s.status}">${s.status.replace('_', ' ')}</span>
        <button class="delete-btn" title="Delete">&#x2715;</button>
      `;
      div.onclick = function(e) {
        if (e.target.classList.contains('delete-btn')) return;
        selectSession(s);
      };
      div.querySelector('.delete-btn').onclick = async function(e) {
        e.stopPropagation();
        if (confirm('Delete this session and all its data?')) {
          await fetch(`/api/sessions/${s.id}`, { method: 'DELETE' });
          if (currentSessionId === s.id) { currentSessionId = null; resetUI(); }
          loadSessions();
        }
      };
      list.appendChild(div);
    });
  } catch(e) {}
}

function selectSession(s) {
  currentSessionId = s.id;
  document.getElementById('requirement-input').value = s.requirement || '';
  document.getElementById('level-select').value = s.challenge_level || 'medium';

  renderConversation(s.conversation);

  if (s.status === 'completed') {
    setUIState('completed');
  } else if (s.status === 'awaiting_human') {
    setUIState('awaiting_human');
    document.getElementById('human-review-input').focus();
  } else if (s.status === 'interrupted' || s.status === 'running') {
    setUIState('interrupted');
  } else {
    setUIState('idle');
    document.getElementById('chat-area').innerHTML = '<div class="empty-state"><p>Select a session to view</p></div>';
  }

  loadSessions();
}

function renderConversation(conv) {
  const area = document.getElementById('chat-area');
  area.innerHTML = '';
  if (!conv || !conv.length) {
    area.innerHTML = '<div class="empty-state"><p>No conversation data</p></div>';
    return;
  }
  if (typeof conv === 'string') {
    try { conv = JSON.parse(conv); } catch(e) { conv = []; }
  }
  conv.forEach(msg => {
    const div = document.createElement('div');
    const roleClass = msg.type === 'human_challenge' ? 'human_challenge' : msg.role;
    div.className = 'message ' + roleClass;
    div.innerHTML = `<div class="msg-header">${msg.role.toUpperCase()} &mdash; Round ${msg.round} (${msg.type})</div>
                     <div class="msg-content">${escapeHtml(msg.content)}</div>`;
    area.appendChild(div);
  });
  area.scrollTop = area.scrollHeight;
}

function resetUI() {
  setUIState('idle');
  document.getElementById('chat-area').innerHTML = '<div class="empty-state"><p>Enter your design requirement above, select a challenge level, and click <strong>Start Challenge</strong>.</p></div>';
  document.getElementById('requirement-input').value = '';
  document.getElementById('file-name').textContent = '';
  document.getElementById('file-input').value = '';
  document.getElementById('human-review-input').value = '';
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function escapeAttr(str) {
  if (!str) return '';
  return str.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

loadSessions();
setInterval(loadSessions, 5000);
</script>
</body>
</html>
